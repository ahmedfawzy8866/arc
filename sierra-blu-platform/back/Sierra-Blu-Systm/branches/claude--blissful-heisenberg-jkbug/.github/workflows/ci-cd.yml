name: Sierra Blu Core Engine CI-CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package.json'
        # Fallback if package.json doesn't exist yet
        continue-on-error: true

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Core Code Audit
      run: |
        python scripts/ai_analyzer.py

    - name: Verify Frontend Integrity
      run: |
        echo "Validating luxury frontend assets..."
        if [ -f frontend/hero-filter.html ]; then
          grep -q "sierra-blu" frontend/hero-filter.html && echo "HTML structure verified."
        fi
